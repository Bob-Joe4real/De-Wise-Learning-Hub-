<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DE-WISE Hub | Study Room</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { 
            --primary: #00E5FF; 
            --primary-glow: rgba(0, 229, 255, 0.2);
            --bg: #050b14; 
            --surface: rgba(11, 18, 36, 0.7); 
            --surface-hover: rgba(16, 28, 54, 0.9);
            --text: #F8FAFC; 
            --text-muted: #94A3B8;
            --border: rgba(255, 255, 255, 0.06); 
            --border-active: rgba(0, 229, 255, 0.4);
            --radius-lg: 16px;
            --radius-md: 10px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
        }

        html, body {
            width: 100%;
            height: 100%;
            max-width: 100%;
            overflow: hidden;
            position: relative;
        }

        body { 
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 229, 255, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(11, 18, 36, 0.8) 0px, transparent 70%),
                linear-gradient(rgba(255, 255, 255, 0.007) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.007) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 30px 30px, 30px 30px;
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            backdrop-filter: blur(20px);
        }

        /* Modern Glassmorphic Header with Universal Nav Bars */
        header { 
            padding: 12px 24px; 
            background: rgba(5, 11, 20, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            width: 100%;
            flex-shrink: 0;
            gap: 15px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn { 
            color: var(--text-muted); 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-weight: 600; 
            font-size: 0.85rem; 
            letter-spacing: 0.5px;
            padding: 8px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
            transition: var(--transition);
        }

        .back-btn:hover {
            color: var(--primary);
            border-color: var(--primary-glow);
            background: rgba(0, 229, 255, 0.05);
            transform: translateX(-3px);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* Prominent Top-Level Navigation Nodes */
        .topic-nav-controls {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(0, 229, 255, 0.1);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 12px var(--primary-glow);
        }

        .nav-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            border-color: var(--border);
        }

        .header-meta {
            text-align: right;
            min-width: 0;
        }

        #subject-display { 
            color: var(--text); 
            font-size: 1rem; 
            font-weight: 700;
            letter-spacing: -0.3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #standard-display { 
            font-size: 0.75rem; 
            color: var(--primary); 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* Layout Architecture Configuration */
        .main-layout { 
            display: grid; 
            grid-template-columns: 1fr 360px; 
            flex: 1; 
            gap: 20px;
            padding: 20px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            height: calc(100% - 65px);
            overflow: hidden;
        }

        .video-side { 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            gap: 16px;
            height: 100%;
            width: 100%;
            min-width: 0;
        }

        .video-wrapper { 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: var(--radius-lg); 
            overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            flex-shrink: 0;
        }

        .video-wrapper div#main-player,
        .video-wrapper iframe { 
            position: absolute;
            top: 0; left: 0;
            width: 100% !important; 
            height: 100% !important; 
            border: none; 
        }

        .info { 
            width: 100%; 
            padding: 20px;
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            overflow-y: auto;
        }

        .title-meta-area h2 { 
            font-size: 1.25rem; 
            color: var(--text); 
            margin-bottom: 6px; 
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .title-meta-area p { 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .title-meta-area p::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
        }

        /* Modules Sidebar Framework */
        .content-side { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: var(--radius-lg);
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            height: 100%;
            width: 100%;
            min-width: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.15);
            flex-shrink: 0;
        }

        .sidebar-header h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-weight: 700;
        }

        .pane { 
            flex: 1; 
            overflow-y: auto; 
            padding: 16px;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
        }

        .pane::-webkit-scrollbar {
            width: 5px;
        }
        .pane::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        #topic-list-container { 
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .topic-item { 
            padding: 14px 16px; 
            background: rgba(255,255,255,0.02); 
            border-radius: var(--radius-md); 
            cursor: pointer; 
            border: 1px solid var(--border); 
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .topic-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: transparent;
            transition: var(--transition);
        }

        .topic-item:hover { 
            background: var(--surface-hover);
            border-color: rgba(255,255,255,0.12);
        }

        .topic-item h4 { 
            font-size: 0.85rem; 
            font-weight: 500; 
            color: #E2E8F0;
            line-height: 1.4;
            padding-right: 10px;
        }

        .topic-item.playing { 
            border-color: var(--border-active); 
            background: rgba(0, 229, 255, 0.04); 
        }

        .topic-item.playing::before {
            background: var(--primary);
        }

        .topic-item.playing h4 {
            color: var(--primary);
            font-weight: 600;
        }

        .status-badge {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--primary);
            background: rgba(0, 229, 255, 0.1);
            padding: 3px 6px;
            border-radius: 4px;
            opacity: 0;
            white-space: nowrap;
        }

        .topic-item.playing .status-badge {
            opacity: 1;
        }

        /* RESPONSIVE LAYOUT BREAKPOINTS */
        @media (max-width: 1024px) {
            .main-layout { 
                grid-template-columns: 100%; 
                grid-template-rows: auto auto 1fr;
                height: calc(100% - 65px);
                gap: 12px; 
                padding: 12px; 
            }
            .video-side {
                height: auto;
                flex-shrink: 0;
            }
            .content-side { 
                height: 100%; 
            }
        }

        @media (max-width: 600px) {
            header {
                padding: 10px 12px;
            }
            .back-btn {
                padding: 6px 10px;
                font-size: 0.75rem;
            }
            .nav-btn {
                padding: 6px 10px;
                font-size: 0.75rem;
            }
            #subject-display {
                font-size: 0.8rem;
                max-width: 130px;
            }
        }

        @media (max-width: 480px) {
            .main-layout { padding: 8px; gap: 10px; }
            .info { padding: 12px; }
            .title-meta-area h2 { font-size: 1.05rem; }
        }

        /* Sideways Landscape Configurations */
        @media (max-height: 500px) and (orientation: landscape) {
            header { padding: 6px 16px; }
            .main-layout { 
                grid-template-columns: 1.2fr 1fr; 
                grid-template-rows: 100%;
                height: calc(100% - 52px);
                padding: 8px; 
                gap: 10px;
            }
            .video-side, .content-side { height: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <a href="curriculum.html" class="back-btn"><i class="ri-arrow-left-line"></i> EXIT</a>
            <div class="topic-nav-controls">
                <button class="nav-btn" id="prev-btn" onclick="goToSiblingTopic(-1)" disabled>
                    <i class="ri-arrow-left-s-line"></i> Back
                </button>
                <button class="nav-btn" id="next-btn" onclick="goToSiblingTopic(1)" disabled>
                    Next <i class="ri-arrow-right-s-line"></i>
                </button>
            </div>
        </div>
        <div class="header-meta">
            <h3 id="subject-display">Subject</h3>
            <p id="standard-display">Standard</p>
        </div>
    </header>

    <main class="main-layout">
        <section class="video-side">
            <div class="video-wrapper">
                <div id="main-player"></div>
            </div>
            <div class="info">
                <div class="title-meta-area">
                    <h2 id="active-topic-title">Loading Lesson...</h2>
                    <p>Director: De-Wise Learning Field Institute</p>
                </div>
            </div>
        </section>

        <section class="content-side">
            <div class="sidebar-header">
                <h3>Course Modules</h3>
            </div>
            <div class="pane" id="pane-topics">
                <div id="topic-list-container"></div>
            </div>
        </section>
    </main>
    
    <script src="data.js"></script>

<script>
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    const urlParams = new URLSearchParams(window.location.search);
    const subjectName = urlParams.get('subject') || "Mathematics (JSS)";
    const standardName = urlParams.get('standard') || "General";

    document.getElementById('subject-display').innerText = subjectName;
    document.getElementById('standard-display').innerText = standardName;

    let ytPlayer = null;
    let topicsList = [];
    let currentActiveIndex = 0;
    let stateTrackingInterval = null;

    function onYouTubeIframeAPIReady() {
        initCourseStructure();
    }

    function initCourseStructure() {
        const listContainer = document.getElementById('topic-list-container');
        
        if (typeof curriculumData === 'undefined') {
            console.error("Error: data.js was not found or is empty.");
            return;
        }

        topicsList = curriculumData[subjectName] || [];

        if (topicsList.length === 0) {
            document.getElementById('active-topic-title').innerText = "Course Coming Soon!";
            listContainer.innerHTML = "<p style='padding:20px; text-align:center; opacity:0.5; font-size:0.9rem;'>No topics found for this subject yet.</p>";
            return;
        }

        topicsList.forEach((t, index) => {
            const item = document.createElement('div');
            item.className = 'topic-item';
            item.id = `topic-${index}`;
            item.innerHTML = `
                <h4>${index + 1}. ${t.title}</h4>
                <span class="status-badge">Playing</span>
            `;
            item.onclick = () => loadSelectedVideoIndex(index);
            listContainer.appendChild(item);
        });

        loadSelectedVideoIndex(0);
    }

    function loadSelectedVideoIndex(targetIndex) {
        if (targetIndex < 0 || targetIndex >= topicsList.length) return;
        
        saveCurrentPlaybackProgress();

        currentActiveIndex = targetIndex;
        const currentData = topicsList[currentActiveIndex];

        document.getElementById('active-topic-title').innerText = currentData.title;

        document.querySelectorAll('.topic-item').forEach(i => i.classList.remove('playing'));
        const activeCard = document.getElementById(`topic-${currentActiveIndex}`);
        if (activeCard) activeCard.classList.add('playing');

        const sessionStoreKey = `dewise_progress_${subjectName}_vid_${currentData.vid}`;
        const previousStoppedTime = parseFloat(sessionStorage.getItem(sessionStoreKey)) || 0;

        if (!ytPlayer) {
            ytPlayer = new YT.Player('main-player', {
                videoId: currentData.vid,
                playerVars: {
                    'autoplay': 0,
                    'rel': 0,
                    'modestbranding': 1,
                    'enablejsapi': 1,
                    'start': Math.floor(previousStoppedTime)
                },
                events: {
                    'onStateChange': handlePlayerStateTransition
                }
            });
        } else {
            ytPlayer.cueVideoById({
                videoId: currentData.vid,
                startSeconds: previousStoppedTime
            });
        }

        document.getElementById('prev-btn').disabled = (currentActiveIndex === 0);
        document.getElementById('next-btn').disabled = (currentActiveIndex === topicsList.length - 1);
    }

    function goToSiblingTopic(directionOffset) {
        const nextTargetIndex = currentActiveIndex + directionOffset;
        loadSelectedVideoIndex(nextTargetIndex);
    }

    function handlePlayerStateTransition(event) {
        if (event.data === YT.PlayerState.PLAYING) {
            if (!stateTrackingInterval) {
                stateTrackingInterval = setInterval(() => {
                    saveCurrentPlaybackProgress();
                }, 1000);
            }
        } else {
            if (stateTrackingInterval) {
                clearInterval(stateTrackingInterval);
                stateTrackingInterval = null;
            }
            saveCurrentPlaybackProgress();
        }
    }

    function saveCurrentPlaybackProgress() {
        if (ytPlayer && typeof ytPlayer.getCurrentTime === 'function' && topicsList[currentActiveIndex]) {
            const currentTimeStamp = ytPlayer.getCurrentTime();
            const totalDurationStamp = ytPlayer.getDuration();
            const activeVidId = topicsList[currentActiveIndex].vid;
            const storageKey = `dewise_progress_${subjectName}_vid_${activeVidId}`;

            if (currentTimeStamp > 0 && (totalDurationStamp - currentTimeStamp > 2)) {
                sessionStorage.setItem(storageKey, currentTimeStamp);
            }
        }
    }
</script>

</body>
</html>
