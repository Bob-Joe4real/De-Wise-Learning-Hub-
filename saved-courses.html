<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Courses | DE-WISE Learning Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00E5FF;
            --accent: #FFD700;
            --bg: #02050E;
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #F8FAFC;
            --text-dim: #94A3B8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; }

        header {
            padding: 25px;
            background: linear-gradient(135deg, #001f3f, #000428);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .back-btn { color: white; font-size: 1.5rem; text-decoration: none; }

        /* --- UPLOAD SECTION --- */
        .upload-area {
            margin: 20px;
            padding: 30px;
            border: 2px dashed var(--primary);
            border-radius: 20px;
            text-align: center;
            background: var(--surface);
            cursor: pointer;
        }
        .upload-area i { font-size: 3rem; color: var(--primary); display: block; margin-bottom: 10px; }
        #file-input { display: none; }

        /* --- GALLERY GRID --- */
        .course-list {
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }
        .file-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            position: relative;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        .file-card i { font-size: 2.5rem; color: var(--accent); margin-bottom: 10px; display: block; }
        .file-name { font-size: 0.75rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .delete-btn {
            position: absolute; top: 5px; right: 5px;
            color: #FF4B4B; background: rgba(0,0,0,0.3);
            border-radius: 50%; width: 25px; height: 25px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        /* --- VIEWER MODAL --- */
        #viewer-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 2000; display: none; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }
        .viewer-content { width: 100%; max-width: 600px; max-height: 80vh; border-radius: 10px; }
        .close-viewer { position: absolute; top: 30px; right: 30px; font-size: 2.5rem; color: white; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 500px; height: 75px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border-radius: 40px; border: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; }
        .nav-item { color: var(--text-dim); text-align: center; font-size: 0.7rem; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn"><i class="ri-arrow-left-line"></i></a>
        <h2>Saved Courses</h2>
    </header>

    <div class="upload-area" onclick="document.getElementById('file-input').click()">
        <i class="ri-upload-cloud-2-line"></i>
        <p>Tap to Upload Course Material</p>
        <small style="color: var(--text-dim)">(Images, MP4, MP3, PDF, Docs)</small>
        <input type="file" id="file-input" onchange="handleFileUpload(this)">
    </div>

    <div class="course-list" id="course-list">
        </div>

    <div id="viewer-modal">
        <i class="ri-close-line close-viewer" onclick="closeViewer()"></i>
        <div id="viewer-body" style="width:100%; display:flex; justify-content:center;"></div>
        <h3 id="viewer-title" style="margin-top:20px; font-size: 0.9rem;"></h3>
    </div>

    <nav>
        <a href="index.html" class="nav-item"><i class="ri-home-line"></i><br>Home</a>
        <a href="Mini Games.html" class="nav-item"><i class="ri-game-line"></i><br>Games</a>
        <a href="Profile.html" class="nav-item"><i class="ri-user-line"></i><br>Profile</a>
    </nav>

    <script>
        let savedFiles = JSON.parse(localStorage.getItem('dw_saved_files')) || [];

        window.onload = renderFiles;

        function handleFileUpload(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const fileData = {
                    id: Date.now(),
                    name: file.name,
                    type: file.type,
                    size: (file.size / 1024 / 1024).toFixed(2) + " MB",
                    content: e.target.result // Base64 Data
                };

                savedFiles.push(fileData);
                localStorage.setItem('dw_saved_files', JSON.stringify(savedFiles));
                renderFiles();
            };
            reader.readAsDataURL(file);
        }

        function renderFiles() {
            const container = document.getElementById('course-list');
            container.innerHTML = '';

            if (savedFiles.length === 0) {
                container.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color:var(--text-dim); margin-top:40px;">No files saved yet.</p>`;
                return;
            }

            savedFiles.forEach(file => {
                let icon = "ri-file-line";
                if (file.type.includes('image')) icon = "ri-image-fill";
                else if (file.type.includes('video')) icon = "ri-video-fill";
                else if (file.type.includes('audio')) icon = "ri-music-fill";
                else if (file.type.includes('pdf')) icon = "ri-book-read-fill";

                const card = document.createElement('div');
                card.className = 'file-card';
                card.innerHTML = `
                    <div class="delete-btn" onclick="deleteFile(${file.id}, event)"><i class="ri-delete-bin-line" style="font-size:12px; color:white;"></i></div>
                    <div onclick="viewFile(${file.id})">
                        <i class="${icon}"></i>
                        <div class="file-name">${file.name}</div>
                        <small style="font-size:10px; color:var(--text-dim)">${file.size}</small>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function viewFile(id) {
            const file = savedFiles.find(f => f.id === id);
            const body = document.getElementById('viewer-body');
            const modal = document.getElementById('viewer-modal');
            const title = document.getElementById('viewer-title');
            
            body.innerHTML = '';
            title.innerText = file.name;

            if (file.type.includes('image')) {
                body.innerHTML = `<img src="${file.content}" class="viewer-content">`;
            } else if (file.type.includes('video')) {
                body.innerHTML = `<video src="${file.content}" controls autoplay class="viewer-content"></video>`;
            } else if (file.type.includes('audio')) {
                body.innerHTML = `<div style="text-align:center;"><i class="ri-music-2-fill" style="font-size:5rem; color:var(--primary);"></i><br><audio src="${file.content}" controls autoplay></audio></div>`;
            } else {
                body.innerHTML = `<div style="text-align:center;"><i class="ri-file-text-fill" style="font-size:5rem; color:var(--accent);"></i><p>Document Preview not available in browser.<br><a href="${file.content}" download="${file.name}" style="color:var(--primary)">Download to View</a></p></div>`;
            }

            modal.style.display = 'flex';
        }

        function deleteFile(id, e) {
            e.stopPropagation();
            if (confirm("Delete this file permanently?")) {
                savedFiles = savedFiles.filter(f => f.id !== id);
                localStorage.setItem('dw_saved_files', JSON.stringify(savedFiles));
                renderFiles();
            }
        }

        function closeViewer() {
            document.getElementById('viewer-modal').style.display = 'none';
            document.getElementById('viewer-body').innerHTML = ''; // Stop video/audio
        }
    </script>
</body>
</html>
