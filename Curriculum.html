<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Classes | DE-WISE Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00E5FF;
            --primary-glow: rgba(0, 229, 255, 0.25);
            --secondary: #7000FF;
            --secondary-glow: rgba(112, 0, 255, 0.3);
            --bg: #050b14;
            --surface: rgba(11, 18, 36, 0.6);
            --surface-hover: rgba(16, 28, 54, 0.85);
            --border: rgba(255, 255, 255, 0.06);
            --text: #F8FAFC;
            --text-muted: #94A3B8;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-full: 30px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
        }

        body { 
            background: var(--bg); 
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 229, 255, 0.03) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(112, 0, 255, 0.03) 0px, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.005) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.005) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 35px 35px, 35px 35px;
            color: var(--text); 
            min-height: 100vh;
            padding-bottom: 60px; 
            backdrop-filter: blur(20px);
        }

        /* Glassmorphic Immersive Header */
        header {
            padding: 40px 20px;
            background: rgba(5, 11, 20, 0.8);
            backdrop-filter: blur(12px);
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .back-btn { 
            position: absolute; 
            left: 30px; 
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted); 
            font-size: 1.25rem; 
            padding: 10px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            text-decoration: none;
        }

        .back-btn:hover {
            color: var(--primary);
            border-color: var(--primary-glow);
            background: rgba(0, 229, 255, 0.05);
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FFF 40%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* Controls & Toggles */
        .level-toggle { 
            display: flex; 
            justify-content: center; 
            gap: 14px; 
            margin: 40px 0 20px 0; 
        }
        
        .btn-level {
            padding: 12px 32px; 
            border-radius: var(--radius-full); 
            border: 1px solid var(--border);
            background: var(--surface); 
            color: var(--text-muted); 
            cursor: pointer; 
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-level:hover {
            border-color: rgba(255,255,255,0.15);
            color: #FFF;
            transform: translateY(-1px);
        }

        .btn-level.active { 
            background: var(--primary); 
            color: #030712; 
            border-color: var(--primary); 
            font-weight: 700;
            box-shadow: 0 0 25px var(--primary-glow), 0 4px 15px rgba(0, 229, 255, 0.2);
        }

        #dept-container { 
            display: none; 
            justify-content: center; 
            gap: 12px; 
            margin-bottom: 30px; 
            flex-wrap: wrap; 
            animation: fadeIn 0.3s ease forwards;
        }
        
        .btn-dept {
            padding: 10px 22px; 
            border-radius: var(--radius-md); 
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border); 
            color: var(--text-muted); 
            font-size: 0.85rem; 
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-dept:hover {
            background: rgba(255,255,255,0.05);
            color: #FFF;
        }

        .btn-dept.active { 
            border-color: var(--secondary); 
            color: #FFF; 
            background: rgba(112, 0, 255, 0.15); 
            box-shadow: 0 0 20px var(--secondary-glow);
        }

        /* Fluid Subject Grid System */
        .subject-grid { 
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 30px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 25px; 
        }
        
        /* Premium Card UI with Integrated Images */
        .subject-card {
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: var(--radius-lg);
            padding: 16px; 
            text-align: center; 
            transition: var(--transition); 
            cursor: pointer;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 16px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        .subject-card:hover { 
            transform: translateY(-6px); 
            border-color: rgba(0, 229, 255, 0.4); 
            background: var(--surface-hover);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 30px rgba(0, 229, 255, 0.05); 
        }

        /* Image Frame UI */
        .subject-image-container {
            width: 100%;
            height: 130px;
            border-radius: var(--radius-md);
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .subject-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Sophisticated overlay mesh to prevent images from breaking your dark aesthetic */
        .subject-image-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(5, 11, 20, 0.1), rgba(5, 11, 20, 0.7));
        }

        .subject-card:hover .subject-img {
            transform: scale(1.1);
        }

        .subject-card span { 
            font-weight: 600; 
            font-size: 1.1rem; 
            color: var(--text);
            letter-spacing: -0.2px;
            margin-top: 4px;
        }
        
        .subject-card small {
            color: var(--secondary);
            background: rgba(112, 0, 255, 0.12);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid rgba(112, 0, 255, 0.2);
            margin-bottom: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            header { padding: 30px 16px; }
            .back-btn { position: relative; left: 0; top: 0; transform: none; margin: 0 auto 16px auto; width: fit-content; }
            .level-toggle { margin: 24px 0; }
            .subject-grid { padding: 0 16px; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
            .subject-card { padding: 12px; gap: 12px; }
            .subject-image-container { height: 100px; }
            .subject-card span { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn"><i class="ri-arrow-left-line"></i></a>
        <h1>Academic Excellence</h1>
        <p>Select your class level to begin learning</p>
    </header>

    <div class="level-toggle">
        <button class="btn-level active" onclick="selectLevel('junior', this)">Junior Class</button>
        <button class="btn-level" onclick="selectLevel('senior', this)">Senior Class</button>
    </div>

    <div id="dept-container">
        <button class="btn-dept active" onclick="filterSenior('Science', this)">Science</button>
        <button class="btn-dept" onclick="filterSenior('Commercial', this)">Commercial</button>
        <button class="btn-dept" onclick="filterSenior('Art', this)">Art</button>
    </div>

    <div class="subject-grid" id="subject-list"></div>

    <script>
        // High-Quality content photography mappings matching the dark futuristic design pattern
        const subjectImages = {
            "Mathematics1": "https://images.unsplash.com/photo-1635070041078-e363dbe005cb?auto=format&fit=crop&w=400&q=80",
            "English Language": "https://images.unsplash.com/photo-1455390582262-044cdead277a?auto=format&fit=crop&w=400&q=80",
            "Basic Science": "https://images.unsplash.com/photo-1532094349884-543bc11b234d?auto=format&fit=crop&w=400&q=80",
            "Computer": "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&w=400&q=80",
            "Business Studies": "https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=400&q=80",
            "Physics": "https://images.unsplash.com/photo-1614064641938-3bbee52942c7?auto=format&fit=crop&w=400&q=80",
            "Chemistry": "https://images.unsplash.com/photo-1617155093730-a8bf47be792d?auto=format&fit=crop&w=400&q=80",
            "Biology": "https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?auto=format&fit=crop&w=400&q=80",
            "Mathematics2": "https://images.unsplash.com/photo-1509228468518-180dd4864904?auto=format&fit=crop&w=400&q=80",
            "Financial Accounting": "https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?auto=format&fit=crop&w=400&q=80",
            "Commerce": "https://images.unsplash.com/photo-1578575437130-527eed3abbec?auto=format&fit=crop&w=400&q=80",
            "Economics": "https://images.unsplash.com/photo-1590283603385-17ffb3a7f29f?auto=format&fit=crop&w=400&q=80",
            "Literature-in-English": "https://images.unsplash.com/photo-1497633762265-9d179a990aa6?auto=format&fit=crop&w=400&q=80",
            "Government": "https://images.unsplash.com/photo-1541872703-74c5e44368f9?auto=format&fit=crop&w=400&q=80",
            "History": "https://images.unsplash.com/photo-1461360370896-922624d12aa1?auto=format&fit=crop&w=400&q=80"
        };

        const curriculum = {
            junior: [
                { name: "Mathematics1", standard: "BECE Standard" },
                { name: "English Language", standard: "BECE Standard" },
                { name: "Basic Science", standard: "BECE Standard" },
                { name: "Computer", standard: "BECE Standard" },
                { name: "Business Studies", standard: "BECE Standard" }
            ],
            senior: {
                Science: [
                    { name: "Physics", standard: "WAEC/JAMB/NECO" },
                    { name: "Chemistry", standard: "WAEC/JAMB/NECO" },
                    { name: "Biology", standard: "WAEC/JAMB/NECO" },
                    { name: "Mathematics2", standard: "WAEC/JAMB/NECO" }
                ],
                Commercial: [
                    { name: "Financial Accounting", standard: "WAEC/JAMB/NECO" },
                    { name: "Commerce", standard: "WAEC/JAMB/NECO" },
                    { name: "Economics", standard: "WAEC/JAMB/NECO" }
                ],
                Art: [
                    { name: "Literature-in-English", standard: "WAEC/JAMB/NECO" },
                    { name: "Government", standard: "WAEC/JAMB/NECO" },
                    { name: "History", standard: "WAEC/JAMB/NECO" }
                ]
            }
        };

        function selectLevel(level, btn) {
            document.querySelectorAll('.btn-level').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const deptBox = document.getElementById('dept-container');
            if (level === 'senior') {
                deptBox.style.display = 'flex';
                filterSenior('Science', document.querySelector('.btn-dept'));
            } else {
                deptBox.style.display = 'none';
                renderSubjects(curriculum.junior);
            }
        }

        function filterSenior(dept, btn) {
            document.querySelectorAll('.btn-dept').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderSubjects(curriculum.senior[dept]);
        }

        function renderSubjects(list) {
            const container = document.getElementById('subject-list');
            container.innerHTML = '';
            
            if(!list || list.length === 0) return;

            list.forEach(sub => {
                const card = document.createElement('div');
                card.className = 'subject-card';
                card.onclick = () => {
                    window.location.href = `player.html?subject=${encodeURIComponent(sub.name)}&standard=${encodeURIComponent(sub.standard)}`;
                };
                
                // Pull targeted crisp photo link via map
                const imageUrl = subjectImages[sub.name] || "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=400&q=80";

                card.innerHTML = `
                    <div class="subject-image-container">
                        <img src="${imageUrl}" class="subject-img" alt="${sub.name}" loading="lazy">
                    </div>
                    <span>${sub.name}</span>
                    <small>${sub.standard}</small>
                `;
                container.appendChild(card);
            });
        }
        
        window.onload = () => renderSubjects(curriculum.junior);
    </script>
</body>
</html>
